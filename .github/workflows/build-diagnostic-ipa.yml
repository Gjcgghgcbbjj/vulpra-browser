name: Build Vulpra native diagnostic IPA

on:
  workflow_dispatch:
    inputs:
      xcode_version:
        required: true
        default: Xcode_26.4.1.app
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 120
    env:
      XCODE_APP: ${{ inputs.xcode_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          sudo xcode-select --switch "/Applications/$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Restore matching Gecko runtime
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          name="$(./Tools/Runtime/runtime-substrate-key.sh "$XCODE_APP")"
          artifact_id="$(gh api --paginate "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100" --jq '.artifacts[] | select(.expired == false) | [.created_at, .id, .name] | @tsv' | awk -F $'\t' -v name="$name" '$3 == name {print}' | LC_ALL=C sort -r | sed -n '1p' | cut -f2)"
          test -n "$artifact_id"
          stage="$(mktemp -d)"
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$stage/artifact.zip"
          unzip -q "$stage/artifact.zip" -d "$stage/payload"
          cd "$stage/payload"; shasum -a 256 -c SHA256SUMS; cd "$GITHUB_WORKSPACE"
          export VULPRA_XCODE_BUILD="$(xcodebuild -version | awk '/Build version/ {print $3}')"
          export VULPRA_SDK_BUILD="$(xcrun --sdk iphoneos --show-sdk-build-version)"
          ./Tools/Gecko/gecko-artifact.sh restore "$stage/payload/gecko-runtime-v3.tar.gz" "$XCODE_APP"
          mkdir -p .build/idevice/aarch64-apple-ios/release
          cp "$stage/payload/libidevice_ffi.a" .build/idevice/aarch64-apple-ios/release/
          ./Tools/Runtime/verify-runtime-artifacts.sh
      - name: Build native diagnostic archive
        run: |
          set -euo pipefail
          xcodebuild archive -project Vulpra.xcodeproj -scheme Vulpra \
            -configuration Release -sdk iphoneos \
            -archivePath dist/VulpraDiagnostic.xcarchive \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) VULPRA_DIAGNOSTIC' \
            CODE_SIGNING_ALLOWED=NO | tee diagnostic-build.log
      - name: Package diagnostic IPA
        run: |
          mkdir -p dist/diagnostic/Payload
          cp -R dist/VulpraDiagnostic.xcarchive/Products/Applications/Vulpra.app dist/diagnostic/Payload/
          cd dist/diagnostic
          zip -qry ../Vulpra-Diagnostic.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: vulpra-native-diagnostic-${{ github.run_id }}
          path: |
            dist/Vulpra-Diagnostic.ipa
            diagnostic-build.log
          retention-days: 14
