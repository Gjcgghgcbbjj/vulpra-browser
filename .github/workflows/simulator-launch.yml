name: Vulpra Real iOS Simulator Launch

on:
  workflow_dispatch:
  push:
    branches:
      - feature/vulpra-first-integration
    paths:
      - .github/workflows/simulator-launch.yml

permissions:
  actions: read
  contents: read

jobs:
  launch:
    name: Build and launch the real Vulpra client
    runs-on: macos-26
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      XCODE_APP: Xcode_26.4.1.app
      DERIVED_DATA: ${{ github.workspace }}/.build/simulator-derived

    steps:
      - name: Checkout Vulpra source
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select --switch "/Applications/$XCODE_APP/Contents/Developer"
          xcodebuild -version | tee simulator-environment.log
          xcrun --sdk iphonesimulator --show-sdk-build-version | tee -a simulator-environment.log
          xcrun simctl list runtimes | tee -a simulator-environment.log

      - name: Restore latest matching Gecko Simulator runtime
        shell: bash
        run: |
          set -euo pipefail
          artifact_row="$(gh api --paginate "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.expired == false and (.name | startswith("vulpra-gecko-simulator-"))) | [.created_at, .id, .name] | @tsv' \
            | LC_ALL=C sort -r | sed -n '1p')"
          artifact_id="$(printf '%s' "$artifact_row" | cut -f 2)"
          artifact_name="$(printf '%s' "$artifact_row" | cut -f 3)"
          test -n "$artifact_id"
          printf 'artifact_id=%s\nartifact_name=%s\n' "$artifact_id" "$artifact_name" | tee simulator-runtime.log
          stage="$(mktemp -d)"
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$stage/artifact.zip"
          unzip -q "$stage/artifact.zip" -d "$stage/payload"
          test -s "$stage/payload/gecko-simulator-runtime.tar.gz"
          mkdir -p Vendor/firefox
          tar -xzf "$stage/payload/gecko-simulator-runtime.tar.gz" -C Vendor/firefox
          test -s Vendor/firefox/obj-aarch64-apple-ios-sim/dist/bin/XUL

      - name: Restore pinned default theme resources
        shell: bash
        run: |
          set -euo pipefail
          firefox_sha="$(git ls-tree HEAD Vendor/firefox | awk '{print $3}')"
          test -n "$firefox_sha"
          theme=Vendor/firefox/toolkit/mozapps/extensions/default-theme
          mkdir -p "$theme"
          for name in icon.svg manifest.json preview.svg; do
            curl --fail --location --retry 4 --silent --show-error \
              "https://raw.githubusercontent.com/mozilla-firefox/firefox/$firefox_sha/toolkit/mozapps/extensions/default-theme/$name" \
              --output "$theme/$name"
            test -s "$theme/$name"
          done

      - name: Build the pinned idevice library for Simulator
        shell: bash
        run: |
          set -euo pipefail
          git submodule update --init --depth 1 Vendor/idevice
          ./Tools/Gecko/build-idevice.sh aarch64-apple-ios-sim 2>&1 | tee simulator-idevice.log
          PLATFORM_NAME=iphonesimulator ./Tools/Runtime/verify-runtime-artifacts.sh | tee simulator-runtime-verification.log

      - name: Build the real Vulpra application for Simulator
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          xcodebuild \
            -project Vulpra.xcodeproj \
            -scheme Vulpra \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee simulator-build.log
          test -d "$DERIVED_DATA/Build/Products/Debug-iphonesimulator/Vulpra.app"

      - name: Install, launch, and prove process survival
        shell: bash
        run: |
          set -euo pipefail
          app="$DERIVED_DATA/Build/Products/Debug-iphonesimulator/Vulpra.app"
          runtime="$(xcrun simctl list runtimes -j | python3 -c '
          import json, sys
          values = [item for item in json.load(sys.stdin)["runtimes"] if item.get("isAvailable") and item.get("name", "").startswith("iOS")]
          if not values: raise SystemExit("no available iOS Simulator runtime")
          print(values[-1]["identifier"])
          ')"
          device_type="$(xcrun simctl list devicetypes -j | python3 -c '
          import json, sys
          values = [item for item in json.load(sys.stdin)["devicetypes"] if item.get("name", "").startswith("iPhone")]
          if not values: raise SystemExit("no available iPhone Simulator device type")
          preferred = [item for item in values if "Pro" in item["name"]]
          print((preferred or values)[-1]["identifier"])
          ')"
          udid="$(xcrun simctl create "Vulpra-CI-$GITHUB_RUN_ID" "$device_type" "$runtime")"
          cleanup() { xcrun simctl shutdown "$udid" >/dev/null 2>&1 || true; xcrun simctl delete "$udid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          xcrun simctl boot "$udid"
          xcrun simctl bootstatus "$udid" -b
          xcrun simctl install "$udid" "$app"
          xcrun simctl launch "$udid" com.vulpra.browser 2>&1 | tee simulator-launch.log
          sleep 15
          xcrun simctl io "$udid" screenshot simulator-launch.png

          set +e
          xcrun simctl terminate "$udid" com.vulpra.browser 2>&1 | tee simulator-terminate.log
          survival_status=${PIPESTATUS[0]}
          set -e
          xcrun simctl spawn "$udid" log show \
            --last 3m --style compact --info --debug \
            --predicate 'process == "Vulpra" OR senderImagePath CONTAINS[c] "Vulpra" OR eventMessage CONTAINS[c] "Vulpra" OR eventMessage CONTAINS[c] "com.vulpra.browser"' \
            > simulator-system.log 2>&1 || true
          find "$HOME/Library/Logs/DiagnosticReports" -type f \
            \( -name 'Vulpra*.crash' -o -name 'Vulpra*.ips' \) -mmin -10 \
            -exec cp {} . \; 2>/dev/null || true
          if [ "$survival_status" -ne 0 ]; then
            echo "Vulpra exited before the 15-second survival gate" >&2
            exit 1
          fi

      - name: Upload Simulator evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulpra-simulator-launch-${{ github.run_id }}
          path: |
            simulator-*.log
            simulator-launch.png
            Vulpra*.crash
            Vulpra*.ips
          if-no-files-found: warn
          retention-days: 14
